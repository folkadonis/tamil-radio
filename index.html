<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Tamil Radio & TV — Stream live Chennai FM radio and Tamil TV channels.">
  <title>Tamil Radio & TV — Live Streaming</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="bg-blobs" aria-hidden="true">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
  </div>

  <div class="app">

    <!-- Header -->
    <header class="header">
      <div class="logo">
        <div class="logo-icon">
          <svg viewBox="0 0 40 40" fill="none"><circle cx="20" cy="20" r="18" stroke="url(#g1)" stroke-width="2.5"/><circle cx="20" cy="20" r="10" stroke="url(#g1)" stroke-width="2"/><circle cx="20" cy="20" r="3" fill="url(#g1)"/><defs><linearGradient id="g1" x1="0" y1="0" x2="40" y2="40"><stop stop-color="#f97316"/><stop offset="1" stop-color="#ec4899"/></linearGradient></defs></svg>
        </div>
        <div>
          <h1 class="logo-text">Tamil Radio & TV</h1>
          <p class="logo-sub">Live Streaming</p>
        </div>
      </div>
      <div class="header-actions">
        <div class="listener-wrap">
          <span class="listener-badge" id="listenerBadge" style="display:none;">
            <span class="listener-dot"></span>
            <span id="listenerCount">0</span>
          </span>
          <button id="communityBtn" class="community-btn" aria-label="Open community voice chat" title="Community Voice Chat">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
            <span>Community</span>
          </button>
        </div>
        <button id="themeToggle" class="icon-btn" aria-label="Toggle theme" title="Toggle theme">
          <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
          <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1111.21 3a7 7 0 009.79 9.79z"/></svg>
        </button>
      </div>
    </header>

    <!-- Search -->
    <div class="search-bar">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" id="searchInput" placeholder="Search stations..." autocomplete="off">
    </div>

    <!-- Tabs -->
    <div class="tabs" id="tabs">
      <button class="tab active" data-cat="radio">📻 Radio</button>
      <button class="tab" data-cat="india">🇮🇳 Chennai</button>
      <button class="tab" data-cat="tv">📺 Live TV</button>
    </div>

    <!-- Radio Grid -->
    <div class="stations" id="stationGrid"></div>

    <!-- TV Grid -->
    <div class="tv-grid" id="tvGrid" style="display:none;"></div>

    <!-- Empty state -->
    <div class="empty-state" id="emptyState" style="display:none;">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="48" height="48"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <p>No results found</p>
    </div>

    <!-- Now Playing Bar -->
    <div class="player" id="player">
      <div class="player-inner">
        <div class="player-info">
          <div class="player-visualizer" id="visualizer">
            <span></span><span></span><span></span><span></span><span></span>
          </div>
          <div class="player-meta">
            <p class="player-station" id="playerStation">Select a station</p>
            <p class="player-freq" id="playerFreq">—</p>
          </div>
        </div>
        <div class="player-controls">
          <button class="ctrl-btn" id="prevBtn" aria-label="Previous"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg></button>
          <button class="play-btn" id="playBtn" aria-label="Play / Pause">
            <svg class="icon-play" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
            <svg class="icon-pause" viewBox="0 0 24 24" fill="currentColor"><path d="M6 19h4V5H6zm8-14v14h4V5z"/></svg>
            <div class="spinner" id="spinner"></div>
          </button>
          <button class="ctrl-btn" id="nextBtn" aria-label="Next"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 18l8.5-6L6 6v12zm2 0h2V6h-2v12z" transform="scale(-1,1) translate(-24,0)"/></svg></button>
        </div>
        <div class="player-volume">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 010 14.14M15.54 8.46a5 5 0 010 7.07"/></svg>
          <input type="range" id="volumeSlider" min="0" max="100" value="80" aria-label="Volume">
        </div>
      </div>
    </div>

  </div>

  <!-- TV Player Modal -->
  <div class="tv-modal" id="tvModal">
    <div class="tv-modal-inner">
      <div class="tv-modal-top">
        <div class="tv-modal-info">
          <span class="live-badge"><span class="live-dot"></span> LIVE</span>
          <span class="tv-modal-name" id="tvModalName"></span>
        </div>
        <button class="tv-modal-close" id="tvModalClose" aria-label="Close TV">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <video id="tvVideo" controls playsinline></video>
    </div>
  </div>

  <!-- Community Modal -->
  <div class="community-modal" id="communityModal" aria-hidden="true">
    <div class="community-panel">
      <div class="community-header">
        <div class="community-title">
          <span class="community-live-dot"></span>
          <h2>Community Voice</h2>
        </div>
        <button class="community-close" id="communityClose" aria-label="Leave and close">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <p class="community-desc">Open mic — anyone can join and speak. Tap the mic to talk.</p>
      <div id="jitsiContainer"></div>
    </div>
  </div>

  <audio id="audioEl" preload="none"></audio>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest/dist/hls.min.js"></script>
  <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
